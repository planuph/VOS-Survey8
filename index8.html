<html lang="th">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #006D77; --primary-dark: #004D56; --primary-light: #83C5BE;
  --accent: #E29578; --bg: #F4F9F9; --card: #FFFFFF;
  --text: #1A2E35; --text-muted: #5A7A82; --border: #D0E8EB;
  --success: #2A9D8F; --danger: #E76F51;
  --shadow: 0 4px 24px rgba(0,109,119,0.10);
  --radius: 16px; --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }

.topbar {
  background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, #008891 100%);
  color: white; padding: 0 28px; display: flex; align-items: center;
  gap: 16px; height: 64px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.2);
}
.topbar-logo { font-size: 20px; font-weight: 700; }
.topbar-logo span { color: var(--primary-light); }
.topbar-sub { font-size: 12px; opacity: 0.75; }
.main { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

/* Name card */
.name-card {
  background: white; border-radius: var(--radius); border: 1.5px solid var(--border);
  box-shadow: var(--shadow); padding: 20px 24px; margin-bottom: 24px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.name-card label { font-size: 14px; font-weight: 600; white-space: nowrap; }
.name-card input {
  flex: 1; min-width: 200px; padding: 10px 14px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s;
}
.name-card input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,109,119,0.1); }

/* Form */
.section-header {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  color: white; border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px 24px; display: flex; align-items: center; gap: 12px;
}
.section-header .s-icon { font-size: 28px; }
.section-header h2 { font-size: 18px; font-weight: 700; }
.section-header p { font-size: 13px; opacity: 0.8; margin-top: 2px; }
.s-badge {
  margin-left: auto; background: rgba(255,255,255,0.2);
  border-radius: 12px; padding: 4px 12px; font-size: 12px; font-weight: 600;
}
.profile-fields {
  background: white; border: 1.5px solid var(--border); padding: 20px 24px; border-top: none;
}
.profile-fields h4 { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--primary-dark); }
.profile-fields-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 16px; }
.form-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); font-family: inherit; font-size: 13px;
  background: white; outline: none; transition: border-color 0.2s;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,109,119,0.1); }
.radio-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
.radio-item { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
.section-block {
  background: white; border: 1.5px solid var(--border); border-top: none; padding: 20px 24px;
}
.section-block h3 { font-size: 15px; font-weight: 700; color: var(--primary-dark); margin-bottom: 14px; }
.likert-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.likert-table th {
  background: var(--primary-dark); color: white;
  padding: 8px 10px; text-align: center; font-weight: 600;
}
.likert-table th:first-child { text-align: left; min-width: 200px; }
.likert-table td { padding: 10px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; }
.likert-table td:first-child { text-align: left; }
.likert-table tr:hover td { background: rgba(0,109,119,0.03); }
.likert-radio { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }
.q-num { font-weight: 600; color: var(--primary); margin-right: 6px; }
.openended-section { display: flex; flex-direction: column; gap: 14px; }
.oe-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.oe-textarea {
  width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); font-family: inherit; font-size: 13px;
  resize: vertical; outline: none; transition: border-color 0.2s;
}
.oe-textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,109,119,0.1); }
.form-actions {
  background: white; border: 1.5px solid var(--border); border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  padding: 20px 24px; display: flex; justify-content: flex-end;
}
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px; border-radius: 10px; border: none; cursor: pointer;
  font-family: inherit; font-size: 15px; font-weight: 600; transition: all 0.2s;
}
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); box-shadow: 0 4px 12px rgba(0,109,119,0.3); }

/* Success */
#success-screen {
  display: none; text-align: center; padding: 60px 20px; max-width: 500px; margin: 40px auto;
}
.success-icon {
  width: 90px; height: 90px;
  background: linear-gradient(135deg, var(--success), var(--primary));
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 44px; margin: 0 auto 24px;
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
#success-screen h2 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
#success-screen p { font-size: 15px; color: var(--text-muted); margin-bottom: 8px; }
.success-score {
  display: inline-block;
  background: linear-gradient(135deg, var(--success), var(--primary));
  color: white; font-size: 22px; font-weight: 700;
  padding: 8px 24px; border-radius: 24px; margin: 16px 0 28px;
}
.btn-success {
  background: var(--primary); color: white; padding: 12px 28px;
  border-radius: 10px; border: none; cursor: pointer; font-family: inherit;
  font-size: 15px; font-weight: 600; transition: all 0.2s;
}
.btn-success:hover { background: var(--primary-dark); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  background: #1A2E35; color: white; padding: 14px 20px; border-radius: 12px;
  font-size: 14px; font-weight: 500; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  opacity: 0; transform: translateY(20px); transition: all 0.3s;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { border-left: 4px solid var(--success); }
.toast.error   { border-left: 4px solid var(--danger); }

@media (max-width: 600px) {
  .topbar { padding: 0 16px; }
  .main { padding: 20px 12px; }
  .s-badge { display: none; }
  .likert-table th, .likert-table td { padding: 6px 4px; font-size: 12px; }
}
</style>
</head>

function init() {
  const g = GROUPS.find(x => x.id === GROUP_ID);
  if (!g) { document.getElementById('form-container').innerHTML = '<p>ไม่พบกลุ่มนี้</p>'; return; }
  document.getElementById('form-container').innerHTML = buildFormHTML(g);
}

function buildFormHTML(g) {
  let html = `
    <div class="section-header">
      <div class="s-icon">${g.icon}</div>
      <div>
        <h2>ส่วนที่ ${g.id} : ${g.name}</h2>
        <p>${g.nameEn} | กลุ่มเป้าหมาย: ${g.target}</p>
      </div>
      <div class="s-badge">${g.type==='internal'?'🏥 กลุ่มภายใน':'🌐 กลุ่มภายนอก'}</div>
    </div>
    <div class="profile-fields">
      <h4>👤 ข้อมูลผู้ตอบแบบสอบถาม</h4>
      <div class="profile-fields-grid">`;
  g.profileFields.forEach(pf => {
    if (pf.type==='text') {
      html += `<div class="form-group"><label>${pf.label}</label>
        <input type="text" id="pf_${pf.id}" placeholder="${pf.placeholder||''}"
          oninput="formData.profile['${pf.id}']=this.value"></div>`;
    } else if (pf.type==='radio') {
      html += `<div class="form-group"><label>${pf.label}</label><div class="radio-group">
        ${pf.options.map(o=>`<label class="radio-item"><input type="radio" name="pf_${pf.id}" value="${o}" onchange="formData.profile['${pf.id}']='${o}'"> ${o}</label>`).join('')}
      </div></div>`;
    }
  });
  html += `</div></div>`;
  g.likertSections.forEach(sec => {
    html += `<div class="section-block"><h3>📋 ${sec.id} ${sec.title}
      <span style="font-size:12px;font-weight:400;color:var(--text-muted);">(1=น้อยที่สุด — 5=มากที่สุด)</span></h3>
      <table class="likert-table"><thead><tr>
        <th>ประเด็นการประเมิน</th>
        <th>1<br><small>น้อยที่สุด</small></th><th>2<br><small>น้อย</small></th>
        <th>3<br><small>ปานกลาง</small></th><th>4<br><small>มาก</small></th>
        <th>5<br><small>มากที่สุด</small></th>
      </tr></thead><tbody>`;
    sec.questions.forEach((q,qi) => {
      const key = `${sec.id}_q${qi}`;
      html += `<tr><td><span class="q-num">${qi+1}.</span> ${q}</td>`;
      [1,2,3,4,5].forEach(v => {
        html += `<td><input type="radio" class="likert-radio" name="${key}" value="${v}"
          onchange="formData.likert['${key}']=${v}"></td>`;
      });
      html += `</tr>`;
    });
    html += `</tbody></table></div>`;
  });
  g.openEndedSections.forEach(sec => {
    html += `<div class="section-block"><h3>✍️ ${sec.id} ${sec.title}</h3><div class="openended-section">`;
    sec.questions.forEach((q,qi) => {
      const key = `oe_${sec.id}_q${qi}`;
      html += `<div class="oe-item"><div class="oe-label">${qi+1}. ${q}</div>
        <textarea class="oe-textarea" placeholder="กรอกคำตอบที่นี่..." rows="3"
          oninput="formData.openEnded['${key}']=this.value"></textarea></div>`;
    });
    html += `</div></div>`;
  });
  html += `<div class="form-actions">
    <button class="btn btn-primary" onclick="submitForm()">✅ ส่งแบบประเมิน</button>
  </div>`;
  return html;
}

async function submitForm() {
  const g = GROUPS.find(x => x.id === GROUP_ID);
  const vals = Object.values(formData.likert).filter(v => v > 0);
  const avg  = vals.length > 0 ? vals.reduce((a,b) => a+b,0)/vals.length : 0;
  const name = document.getElementById('respondent-name').value.trim() || 'ไม่ระบุชื่อ';
  const payload = {
    action: 'submitForm', timestamp: new Date().toISOString(),
    hospital: HOSPITAL, period: PERIOD, collector: name,
    groupId: g.id, groupName: g.name, groupType: g.type,
    profile: formData.profile, likert: formData.likert,
    openEnded: formData.openEnded, avgScore: parseFloat(avg.toFixed(2))
  };
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST', headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload), mode: 'no-cors'
    });
  } catch(e) { console.error(e); }
  document.getElementById('form-area').style.display = 'none';
  document.getElementById('success-screen').style.display = 'block';
  document.getElementById('score-display').textContent = 'คะแนนเฉลี่ย: '+(avg>0?avg.toFixed(2):'—')+' / 5';
  window.scrollTo(0,0);
  showToast('✅ ส่งแบบประเมินสำเร็จ!', 'success');
}

function resetForm() {
  formData = { profile: {}, likert: {}, openEnded: {} };
  document.getElementById('respondent-name').value = '';
  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('form-area').style.display = 'block';
  init(); window.scrollTo(0,0);
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+type;
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3500);
}

init();
</script>
